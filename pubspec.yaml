name: reminder_app
description: "Offline calendar-based todo & reminder manager (Android only)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Local database (single source of truth)
  drift: ^2.34.2
  drift_flutter: ^0.3.1

  # Settings + native snapshot storage
  shared_preferences: ^2.5.5

  # Exact-time wake-up reminders
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

  # Home-screen widget bridge (also used as the generic native<->Dart
  # background bridge for the persistent notification)
  home_widget: ^0.9.3

  # Midnight rollover background task
  workmanager: ^0.9.0+3

  # Battery-optimization exemption prompt
  permission_handler: ^12.0.3

  # Month grid
  table_calendar: ^3.2.0

  # Date formatting
  intl: ^0.20.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Same meta/analyzer pin as build_runner below: 2.34.1+1+ needs analyzer 13
  # (meta ^1.18), incompatible with Flutter 3.41.3's pinned meta 1.17.0.
  drift_dev: ^2.34.0
  # 2.15.2 requires meta ^1.18.3 which conflicts with the meta 1.17.0 pinned
  # by flutter_test in Flutter 3.41.3, so allow pub to pick the newest
  # compatible 2.x release (resolves to 2.15.1 at the time of writing).
  build_runner: ^2.14.0

flutter:
  uses-material-design: true
